name: Daily Stock Data Update

on:
  schedule:
    # Runs at 21:00 UTC (4 PM EST - Market Close) every weekday
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to click a button in GitHub to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run Rotation Script
        run: python scripts/calculate_rotation.py

      - name: Commit and Push if data changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: updated daily rotation data [skip ci]" || echo "No changes to commit"
          git push